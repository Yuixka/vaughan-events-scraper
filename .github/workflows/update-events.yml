on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SAVE_DEBUG_HTML: "0"
          MAX_DETAIL_PAGES_PER_SITE: "12"
          MAX_SITE_SECONDS: "90"
          MAX_GOTO_TIMEOUT_MS: "45000"
          MAX_PAGE_TOTAL_MS: "60000"
          MAX_SCROLL_CYCLES: "7"
          MAX_PAGINATION_CLICKS: "5"
        run: xvfb-run --auto-servernum python main.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nature_teens_events.json raw_candidates.json site_counts.json
          git diff --cached --quiet || git commit -m "Update events JSON"
          git push
