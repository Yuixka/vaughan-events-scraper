name: Update events JSON

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: python -m playwright install chromium

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SAVE_DEBUG_HTML: 0
          MAX_DETAIL_PAGES_PER_SITE: 6
          MAX_SITE_SECONDS: 40
          MAX_GOTO_TIMEOUT_MS: 20000
          MAX_PAGE_TOTAL_MS: 30000
          MAX_SCROLL_CYCLES: 4
          MAX_PAGINATION_CLICKS: 3
        run: xvfb-run --auto-servernum python main.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nature_teens_events.json raw_candidates.json
          git diff --cached --quiet || git commit -m "Update events JSON"
          git push
